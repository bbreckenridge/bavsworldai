apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-pvc
  namespace: platform-services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: platform-services
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:latest
        imagePullPolicy: Always
        command: ["node", "dist/index.js", "gateway", "--bind", "loopback", "--port", "3000", "--allow-unconfigured"]
      - name: loopback-relay
        image: alpine/socat:latest
        command: ["socat", "tcp-listen:3001,reuseaddr,fork", "tcp:127.0.0.1:3000"]
        ports:
        - containerPort: 3001
        - containerPort: 3000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 2
            memory: 4Gi
        volumeMounts:
        - name: openclaw-data
          mountPath: /data
      volumes:
      - name: openclaw-data
        persistentVolumeClaim:
          claimName: openclaw-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: platform-services
spec:
  selector:
    app: openclaw
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: openclaw-routing
  namespace: platform-services
spec:
  hosts:
  - "openclaw.example.com"
  gateways:
  - istio-system/default-gateway
  http:
  - match:
    - uri:
        prefix: /
    rewrite:
      authority: "localhost:3000"
    route:
    - destination:
        host: openclaw.platform-services.svc.cluster.local
        port:
          number: 80
