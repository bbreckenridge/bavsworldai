apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-pvc
  namespace: platform-services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: platform-services
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 2
            memory: 4Gi
        volumeMounts:
        - name: openclaw-data
          mountPath: /data
      volumes:
      - name: openclaw-data
        persistentVolumeClaim:
          claimName: openclaw-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: platform-services
spec:
  selector:
    app: openclaw
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: openclaw-routing
  namespace: platform-services
spec:
  hosts:
  - "openclaw.<YOUR-DOMAIN.COM>"
  gateways:
  - istio-system/default-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: openclaw.platform-services.svc.cluster.local
        port:
          number: 80
