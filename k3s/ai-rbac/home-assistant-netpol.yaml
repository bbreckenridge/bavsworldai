# ============================================================
# home-assistant-netpol.yaml
#
# PURPOSE: Allow incoming traffic from Istio Ingress Gateway
# to the Home Assistant pod.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: home-assistant-allow-istio
  namespace: ai-sandbox
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system
    ports:
    - protocol: TCP
      port: 8123
