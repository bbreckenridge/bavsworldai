apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: whisper-allow-istio
  namespace: ai-sandbox
spec:
  podSelector:
    matchLabels:
      app: whisper
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system
      podSelector:
        matchLabels:
          istio: ingressgateway
    ports:
    - protocol: TCP
      port: 8000
