# ============================================================
# open-webui-netpol.yaml
#
# PURPOSE: Allow incoming traffic from Istio Ingress Gateway
# to the Open WebUI pod in the ai-sandbox namespace.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: open-webui-allow-istio
  namespace: ai-sandbox
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system
    ports:
    - protocol: TCP
      port: 8080
