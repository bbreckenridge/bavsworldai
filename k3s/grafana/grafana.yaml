# ============================================================
# grafana.yaml
#
# PURPOSE: Expose the Grafana dashboard via Istio mesh.
# Grafana itself is deployed as a LoadBalancer Service by Helm;
# this VirtualService routes dashboards.<DOMAIN> through the
# shared Istio IngressGateway for TLS termination.
# ============================================================
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: grafana
  namespace: platform-services
spec:
  hosts:
  - "dashboards.example.com"
  gateways:
  - istio-system/default-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: grafana.platform-services.svc.cluster.local
        port:
          number: 80
