apiVersion: apps/v1
kind: Deployment
metadata:
  name: launchpad
  namespace: platform-services
  labels:
    app: launchpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: launchpad
  template:
    metadata:
      labels:
        app: launchpad
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        command: ["/bin/sh", "-c", "envsubst < /tmp/html-template/index.html.template > /usr/share/nginx/html/index.html && cp /tmp/assets/* /usr/share/nginx/html/ 2>/dev/null || true && nginx -g 'daemon off;'"]
        env:
        - name: AUTH_URL
          value: "https://auth.example.com"
        - name: AUTH_CLIENT_ID
          value: "bavsworld-launchpad"
        - name: TELEMETRY_URL
          value: "https://dashboards.example.com"
        - name: HOME_ASSISTANT_URL
          value: "https://home.example.com"
        - name: XIP_AI_URL
          value: "https://chat.example.com"
        - name: DNS_URL
          value: "https://dns.example.com"
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 10m
            memory: 10Mi
          limits:
            cpu: 50m
            memory: 50Mi
        volumeMounts:
        - name: html-template
          mountPath: /tmp/html-template
        - name: web-content
          mountPath: /usr/share/nginx/html
        - name: host-assets
          mountPath: /tmp/assets
      volumes:
      - name: html-template
        configMap:
          name: launchpad-html
      - name: web-content
        emptyDir: {}
      - name: host-assets
        hostPath:
          path: /mnt/media/AI_Data/launchpad/www
          type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: launchpad
  namespace: platform-services
spec:
  selector:
    app: launchpad
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: launchpad-routing
  namespace: platform-services
spec:
  hosts:
  - "example.com"
  - "www.example.com"
  gateways:
  - istio-system/default-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: launchpad.platform-services.svc.cluster.local
        port:
          number: 80
