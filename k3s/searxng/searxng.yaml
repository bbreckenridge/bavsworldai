# ============================================================
# searxng.yaml
#
# PURPOSE: Deploy SearXNG for private web search integration.
# ============================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: ai-sandbox
data:
  settings.yml: |
    use_default_settings: true
    server:
      port: 8080
      bind_address: "0.0.0.0"
      secret_key: "${SEARXNG_SECRET_KEY}"
    search:
      safe_search: 0
      autocomplete: ""
    engines:
      - name: google
        engine: google
        shortcut: g
      - name: duckduckgo
        engine: duckduckgo
        shortcut: d
      - name: bing
        engine: bing
        shortcut: b

---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: ai-sandbox
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
  selector:
    app.kubernetes.io/name: searxng

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
    spec:
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_PORT
              value: "8080"
            - name: SEARXNG_SETTINGS_PATH
              value: "/etc/searxng/settings.yml"
          envFrom:
            - secretRef:
                name: searxng-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
      volumes:
        - name: config
          configMap:
            name: searxng-config
