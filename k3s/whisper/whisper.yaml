# ============================================================
# whisper.yaml
#
# PURPOSE: Deploy local Whisper STT (Speech-to-Text) API.
# ============================================================
---
apiVersion: v1
kind: Service
metadata:
  name: whisper
  namespace: ai-sandbox
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
  selector:
    app: whisper

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
  namespace: ai-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisper
  template:
    metadata:
      labels:
        app: whisper
    spec:
      containers:
        - name: whisper
          image: fedirz/faster-whisper-server:latest-cpu
          ports:
            - containerPort: 8000
          env:
            - name: WHISPER_MODEL
              value: "base" # base is 74MB, extremely fast on CPU
            - name: WHISPER_DEVICE
              value: "cpu"
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "4000m"
              memory: "4Gi"
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: whisper
  namespace: ai-sandbox
spec:
  hosts:
  - "whisper.<YOUR-DOMAIN.COM>"
  gateways:
  - istio-system/default-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: whisper.ai-sandbox.svc.cluster.local
        port:
          number: 80
